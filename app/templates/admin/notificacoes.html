{% extends 'layouts/admin.html' %}
{% block admin_content %}
<section class="page-stack admin-split">
  <form method="post" class="glass-card form-panel">
    <div class="section-heading"><h1>Notificações</h1></div>
    <div class="form-grid">
      <select name="user_id" required>
        {% for user in users %}<option value="{{ user.id }}">{{ user.name }} • {{ user.email }}</option>{% endfor %}
      </select>
      <input name="title" placeholder="Título" required>
      <input name="link" placeholder="Link interno opcional">
      <textarea name="body" placeholder="Mensagem" required></textarea>
    </div>
    <button class="primary-btn" type="submit">Enviar</button>
  </form>
  <div class="glass-card table-panel">
    <div class="section-heading"><h2>Histórico</h2></div>
    <div class="table-like">
      {% for item in items %}
      <div class="row multi"><strong>{{ item.title }}</strong><span>{{ item.body }}</span><span>{{ item.user.name }}</span></div>
      {% else %}
      <div class="empty-state">Nenhuma notificação ainda.</div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
