{% extends 'layouts/admin.html' %}
{% block admin_content %}
<section class="page-stack admin-split">
  <form method="post" class="glass-card form-panel">
    <div class="section-heading"><h1>Extras</h1></div>
    <div class="form-grid">

      <input name="title" placeholder="Título do extra" required>
      <input name="type" placeholder="Tipo" value="video">
      <input name="media_url" placeholder="Mídia">
      <input name="thumb_url" placeholder="Thumb">
      <textarea name="description" placeholder="Descrição"></textarea>

    </div>
    <button class="primary-btn" type="submit">Salvar</button>
  </form>
  <div class="glass-card table-panel">
    <div class="section-heading"><h2>Itens cadastrados</h2></div>
    <div class="table-like">
      {% for item in items %}
      <div class="row"><strong>{{ item.title }}</strong><span>{{ item.created_at|format_dt if item.created_at else '' }}</span></div>
      {% else %}
      <div class="empty-state">Nenhum registro ainda.</div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
