{% extends 'layouts/admin.html' %}
{% block admin_content %}
<section class="page-stack admin-split">
  <form method="post" class="glass-card form-panel">
    <div class="section-heading"><h1>Episódios</h1></div>
    <div class="form-grid">
      <input name="title" placeholder="Título do episódio" required>
      <select name="season_id" required>
        <option value="">Selecione a temporada</option>
        {% for season in seasons %}<option value="{{ season.id }}">{{ season.title }}</option>{% endfor %}
      </select>
      <input name="duration_seconds" type="number" placeholder="Duração em segundos">
      <input name="sort_order" type="number" placeholder="Ordem">
      <input name="status" placeholder="Status" value="published">
      <input name="video_url" placeholder="URL do vídeo ou caminho do volume">
      <input name="thumb_url" placeholder="URL da thumb">
      <textarea name="description" placeholder="Descrição"></textarea>
    </div>
    <button class="primary-btn" type="submit">Salvar</button>
  </form>
  <div class="glass-card table-panel">
    <div class="section-heading"><h2>Episódios cadastrados</h2></div>
    <div class="table-like">
      {% for item in items %}
      <div class="row"><strong>{{ item.title }}</strong><span>{{ item.season.title }}</span></div>
      {% else %}
      <div class="empty-state">Nenhum episódio ainda.</div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
